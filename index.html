<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password generator</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <main class="container">
        <h1>Password Generator</h1>

        <section class="card">
            <div class="row">
                <label for="length">Length</label>
                <input id="length" type="range" min="4" max="64" value="16">
                <input id="lengthNumber" type="number" min="4" max="64" value="16">
            </div>

            <div class="options">
                <label><input id="lower" type="checkbox" checked> Lowercase</label>
                <label><input id="upper" type="checkbox" checked> Uppercase</label>
                <label><input id="numbers" type="checkbox" checked> Numbers</label>
                <label><input id="symbols" type="checkbox" checked> Symbols</label>
               
            </div>

            <div class="actions">
                <button id="generate">Generate</button>
                <button id="copy">Copy</button>
            </div>

            <div class="output">
                <input id="password" readonly placeholder="Your password will appear here">
                <div class="strength">
                    <div id="strengthBar" class="bar"></div>
                </div>
            </div>

            <p class="hint">Tip: Use a long password and enable multiple character types for maximum strength.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
